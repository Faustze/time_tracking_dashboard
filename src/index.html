<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Time tracking dashboard">
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="stylesheet" href="./css/main.css">
  <title>Frontend Mentor | Time tracking dashboard</title>
</head>
<body>

  <!-- ============================================
      ГЛАВНЫЙ КОНТЕЙНЕР DASHBOARD
      Mobile: одноколоночный поток
      Desktop: CSS Grid 4×2 (профиль слева, карточки справа)
      ============================================ -->
  <main class="dashboard">
    <!-- ============================================
        СЕКЦИЯ ПРОФИЛЯ ПОЛЬЗОВАТЕЛЯ
        Содержит: аватар, имя, переключатель периодов
        ============================================ -->
    <section class="dashboard__profile" aria-labelledby="profile-name">
      <!-- Верхняя часть: аватар + имя -->
      <header class="dashboard__profile-header">
        <img
          class="dashboard__profile-avatar"
          src="./images/image-jeremy.png"
          alt="Portrait of Jeremy Robson"
          width="70"
          height="70"
        >
        <div class="dashboard__profile-info">
          <p class="dashboard__profile-label">Report for</p>
          <h1 class="dashboard__profile-name" id="profile-name">Jeremy Robson</h1>
        </div>
      </header>

      <!-- Переключатель периодов: Daily / Weekly / Monthly -->
      <nav class="dashboard__profile-timeframes" aria-label="Select time period">
        <button
          class="dashboard__profile-period"
          data-period="daily"
          aria-pressed="false"
          type="button"
        >Daily</button>
        <button
          class="dashboard__profile-period dashboard__profile-period--active"
          data-period="weekly"
          aria-pressed="true"
          type="button"
        >Weekly</button>
        <button
          class="dashboard__profile-period"
          data-period="monthly"
          aria-pressed="false"
          type="button"
        >Monthly</button>
      </nav>

    </section>

    <!-- ============================================
        КАРТОЧКИ АКТИВНОСТЕЙ
        Каждая карточка: цветной баннер + тело с данными
        Данные заполняются из data.json через JavaScript
        ============================================ -->

    <!-- Work -->
    <article class="dashboard__card" data-activity="work">
      <div class="dashboard__card-banner dashboard__card-banner--work" role="img" aria-label="Work"></div>
      <div class="dashboard__card-body">
        <header class="dashboard__card-header">
          <h2 class="dashboard__card-title">Work</h2>
          <button class="dashboard__card-menu" aria-label="More options for Work" type="button">
            <img src="./images/icon-ellipsis.svg" alt="Ellipsis icon" width="21" height="5">
          </button>
        </header>
        <div class="dashboard__card-content">
          <p class="dashboard__card-current">--hrs</p>
          <p class="dashboard__card-previous">Last Week --hrs</p>
        </div>
      </div>
    </article>

    <!-- Play -->
    <article class="dashboard__card" data-activity="play">
      <div class="dashboard__card-banner dashboard__card-banner--play" role="img" aria-label="Play"></div>
      <div class="dashboard__card-body">
        <header class="dashboard__card-header">
          <h2 class="dashboard__card-title">Play</h2>
          <button class="dashboard__card-menu" aria-label="More options for Play" type="button">
            <img src="./images/icon-ellipsis.svg" alt="" width="21" height="5">
          </button>
        </header>
        <div class="dashboard__card-content">
          <p class="dashboard__card-current">--hrs</p>
          <p class="dashboard__card-previous">Last Week --hrs</p>
        </div>
      </div>
    </article>

    <!-- Study -->
    <article class="dashboard__card" data-activity="study">
      <div class="dashboard__card-banner dashboard__card-banner--study" role="img" aria-label="Study"></div>
      <div class="dashboard__card-body">
        <header class="dashboard__card-header">
          <h2 class="dashboard__card-title">Study</h2>
          <button class="dashboard__card-menu" aria-label="More options for Study" type="button">
            <img src="./images/icon-ellipsis.svg" alt="" width="21" height="5">
          </button>
        </header>
        <div class="dashboard__card-content">
          <p class="dashboard__card-current">--hrs</p>
          <p class="dashboard__card-previous">Last Week --hrs</p>
        </div>
      </div>
    </article>

    <!-- Exercise -->
    <article class="dashboard__card" data-activity="exercise">
      <div class="dashboard__card-banner dashboard__card-banner--exercise" role="img" aria-label="Exercise"></div>
      <div class="dashboard__card-body">
        <header class="dashboard__card-header">
          <h2 class="dashboard__card-title">Exercise</h2>
          <button class="dashboard__card-menu" aria-label="More options for Exercise" type="button">
            <img src="./images/icon-ellipsis.svg" alt="" width="21" height="5">
          </button>
        </header>
        <div class="dashboard__card-content">
          <p class="dashboard__card-current">--hrs</p>
          <p class="dashboard__card-previous">Last Week --hrs</p>
        </div>
      </div>
    </article>

    <!-- Social -->
    <article class="dashboard__card" data-activity="social">
      <div class="dashboard__card-banner dashboard__card-banner--social" role="img" aria-label="Social"></div>
      <div class="dashboard__card-body">
        <header class="dashboard__card-header">
          <h2 class="dashboard__card-title">Social</h2>
          <button class="dashboard__card-menu" aria-label="More options for Social" type="button">
            <img src="./images/icon-ellipsis.svg" alt="" width="21" height="5">
          </button>
        </header>
        <div class="dashboard__card-content">
          <p class="dashboard__card-current">--hrs</p>
          <p class="dashboard__card-previous">Last Week --hrs</p>
        </div>
      </div>
    </article>

    <!-- Self Care -->
    <article class="dashboard__card" data-activity="self care">
      <div class="dashboard__card-banner dashboard__card-banner--self-care" role="img" aria-label="Self Care"></div>
      <div class="dashboard__card-body">
        <header class="dashboard__card-header">
          <h2 class="dashboard__card-title">Self Care</h2>
          <button class="dashboard__card-menu" aria-label="More options for Self Care" type="button">
            <img src="./images/icon-ellipsis.svg" alt="" width="21" height="5">
          </button>
        </header>
        <div class="dashboard__card-content">
          <p class="dashboard__card-current">--hrs</p>
          <p class="dashboard__card-previous">Last Week --hrs</p>
        </div>
      </div>
    </article>

  </main>

  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io" target="_blank" rel="noopener noreferrer">Frontend Mentor</a>.
    Coded by <a href="https://github.com/Faustze" target="_blank" rel="noopener noreferrer">Faustze</a>.
  </footer>

  <script type="module" src="./js/script.js"></script>
</body>
</html>
